version: '3.8'

services:
  gemini-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gemini-openai-proxy
    ports:
      - "3897:3897"
    environment:
      - SECURE_1PSID=${SECURE_1PSID}
      - SECURE_1PSIDTS=${SECURE_1PSIDTS}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PROXY=${PROXY:-}
      - HOST=0.0.0.0
      - PORT=3897
    restart: unless-stopped
